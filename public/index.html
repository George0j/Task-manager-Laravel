<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<script>
// Show Task Manager with slide-down from top
document.getElementById('startBtn').addEventListener('click', () => {
    const landing = document.getElementById('landing');
    const app = document.getElementById('app');

    // Fade out landing
    landing.style.transition = 'opacity 0.8s';
    landing.style.opacity = 0;

    setTimeout(() => {
        landing.classList.add('hidden'); // hide landing
        app.classList.remove('hidden');  // show app

        // Slide-down animation
        setTimeout(() => {
            app.style.opacity = 1;
            app.style.transform = 'translateY(0)';
        }, 50);

    }, 800);
});

// API Base
const API = '/api/tasks';

// CREATE TASK
document.getElementById('taskForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = { title: title.value, due_date: due_date.value, priority: priority.value };
    const res = await fetch(API, {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    if (!res.ok) alert('Error creating task');
    e.target.reset();
    fetchTasks();
});

// FETCH TASKS
async function fetchTasks() {
    let url = API;
    const status = filterStatus.value;
    if (status) url += `?status=${status}`;
    const res = await fetch(url);
    const data = await res.json();
    const container = document.getElementById('taskList');
    container.innerHTML = '';
    if (!data.length) { container.innerHTML = '<p style="color:white;">No tasks found</p>'; return; }
    data.forEach(task => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <h3>${task.title}</h3>
            <p>📅 ${task.due_date}</p>
            <p class="priority-${task.priority}">Priority: ${task.priority}</p>
            <span class="status ${task.status}">${task.status}</span>
            <div class="flex">
                <button class="btn-success" onclick="updateStatus(${task.id})">Next</button>
                <button class="btn-danger" onclick="deleteTask(${task.id})">Delete</button>
            </div>
        `;
        container.appendChild(div);
    });
}

// UPDATE STATUS
async function updateStatus(id) {
    const res = await fetch(`${API}/${id}/status`, { method: 'PATCH' });
    if (!res.ok) alert('Cannot update status');
    fetchTasks();
}

// DELETE TASK
async function deleteTask(id) {
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (!res.ok) alert('Only DONE tasks can be deleted');
    fetchTasks();
}

// DAILY REPORT
async function getReport() {
    const date = reportDate.value;
    const res = await fetch(`${API}/report?date=${date}`);
    const data = await res.json();
    reportOutput.textContent = JSON.stringify(data, null, 2);
}

fetchTasks();
</script>

</body>
</html>
